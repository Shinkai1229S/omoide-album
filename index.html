<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>思い出アルバム</title>

<!-- Swiper -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"/>

<style>

/* 全体 */

body {

  margin: 0;

  background: #fdfdfd;

  font-family: sans-serif;

  color: #333;

  text-align: center;

  overflow-x: hidden;

  position: relative;
}

/* 背景光① */

.bg-light {

  position: fixed;

  width: 800px;

  height: 800px;

  background:
    radial-gradient(
      circle,
      rgba(255,210,220,0.45),
      rgba(255,255,255,0)
    );

  top: -250px;

  right: -250px;

  z-index: 1;

  pointer-events: none;

  filter: blur(80px);

  animation: moveLight 18s ease-in-out infinite;
}

/* 背景光② */

.bg-light2 {

  position: fixed;

  width: 700px;

  height: 700px;

  background:
    radial-gradient(
      circle,
      rgba(210,230,255,0.45),
      rgba(255,255,255,0)
    );

  bottom: -200px;

  left: -200px;

  z-index: 1;

  pointer-events: none;

  filter: blur(80px);

  animation: moveLight2 22s ease-in-out infinite;
}

/* 光①動き */

@keyframes moveLight {

  0% {

    transform:
      translate(0px, 0px);
  }

  50% {

    transform:
      translate(-50px, 40px);
  }

  100% {

    transform:
      translate(0px, 0px);
  }

}

/* 光②動き */

@keyframes moveLight2 {

  0% {

    transform:
      translate(0px, 0px);
  }

  50% {

    transform:
      translate(40px, -50px);
  }

  100% {

    transform:
      translate(0px, 0px);
  }

}

/* 名前 */

h1 {

  margin-top: 18px;

  font-size: 30px;

  font-weight: 500;

  letter-spacing: 2px;

  color: rgba(0,0,0,0.72);

  animation: fadeIn 1.5s ease;

  position: relative;

  z-index: 2;
}

/* メッセージ */

p {

  color: rgba(0,0,0,0.45);

  margin-bottom: 12px;

  font-size: 15px;

  line-height: 1.8;

  animation: fadeIn 2s ease;

  position: relative;

  z-index: 2;
}

/* スライダー */

.swiper {

  width: 100%;

  max-width: 520px;

  height: 72vh;

  margin: auto;

  position: relative;

  z-index: 2;
}

/* スライド */

.swiper-slide {

  display: flex;

  justify-content: center;

  align-items: center;
}

/* 画像 */

.swiper-slide img {

  width: 100%;

  height: 100%;

  object-fit: contain;

  opacity: 0.96;

  filter: brightness(1.02);

  transition: 1s ease;

  animation: fadeInImage 1.2s ease;
}

/* 表示中画像 */

.swiper-slide-active img {

  animation:
    fadeInImage 1.2s ease,
    floatImage 6s ease-in-out infinite;
}

/* 下の丸 */

.swiper-pagination-bullet {

  background: #ccc;

  opacity: 1;
}

.swiper-pagination-bullet-active {

  background: #777;
}

/* タイトル画面 */

#intro {

  position: fixed;

  inset: 0;

  background: rgba(255,255,255,0.96);

  z-index: 9999;

  display: flex;

  justify-content: center;

  align-items: center;

  transition: 1.5s ease;
}

.intro-inner h2 {

  font-size: 42px;

  font-weight: 300;

  letter-spacing: 6px;

  margin-bottom: 10px;

  color: rgba(0,0,0,0.75);
}

.intro-inner span {

  color: rgba(0,0,0,0.35);

  font-size: 14px;

  letter-spacing: 2px;
}

/* タイトル消える */

#intro.hide {

  opacity: 0;

  pointer-events: none;
}

/* Thank you */

.ending {

  margin-top: 40px;

  margin-bottom: 10px;

  color: rgba(0,0,0,0.45);

  font-size: 14px;

  letter-spacing: 4px;

  position: relative;

  z-index: 2;

  animation: fadeIn 3s ease;
}

/* ブランド */

.factory {

  margin-bottom: 30px;

  color: rgba(0,0,0,0.28);

  font-size: 11px;

  letter-spacing: 3px;

  position: relative;

  z-index: 2;
}

/* 文字ふわ */

@keyframes fadeIn {

  from {

    opacity: 0;

    transform: translateY(12px);
  }

  to {

    opacity: 1;

    transform: translateY(0);
  }

}

/* 画像フェード */

@keyframes fadeInImage {

  from {

    opacity: 0;
  }

  to {

    opacity: 1;
  }

}

/* 画像浮遊 */

@keyframes floatImage {

  0% {

    transform: translateY(0px);
  }

  50% {

    transform: translateY(-6px);
  }

  100% {

    transform: translateY(0px);
  }

}

</style>

</head>

<body>

<!-- 背景光 -->

<div class="bg-light"></div>

<div class="bg-light2"></div>

<!-- 音楽 -->

<audio id="bgm" loop>

 <source src="music/bgm.mp3" type="audio/mpeg">
  
</audio>

<!-- タイトル -->

<div id="intro">

  <div class="intro-inner">

    <h2>Omoide</h2>

    <span>Tap to Start</span>

  </div>

</div>

<!-- 名前 -->

<h1 id="name"></h1>

<!-- メッセージ -->

<p id="message"></p>

<!-- スライダー -->

<div class="swiper">

  <div class="swiper-wrapper" id="gallery"></div>

  <div class="swiper-pagination"></div>

</div>

<!-- Thank you -->

<div class="ending">

  Thank you

</div>

<!-- ブランド -->

<div class="factory">

  OMOIDE Factory

</div>

<!-- Swiper -->

<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

<script>

/* JSON読み込み */

fetch('data/a8k2p.json')

.then(res => res.json())

.then(data => {

  document.getElementById("name").innerText = data.name;

  document.getElementById("message").innerText = data.message;

  const gallery = document.getElementById("gallery");

  data.images.forEach(url => {

    const slide = document.createElement("div");

    slide.className = "swiper-slide";

    const img = document.createElement("img");

    img.src = url;

    slide.appendChild(img);

    gallery.appendChild(slide);

  });

  /* Swiper起動 */

  new Swiper('.swiper', {

    loop: true,

    slidesPerView: 1,

    spaceBetween: 0,

    speed: 2200,

    effect: "fade",

    fadeEffect: {
      crossFade: true
    },

    autoplay: {
      delay: 5000,
      disableOnInteraction: false,
    },

    pagination: {

      el: '.swiper-pagination',

      clickable: true
    }

  });

  /* タップ開始 */

  document
  .getElementById("intro")
  .addEventListener("click", () => {

    document
    .getElementById("intro")
    .classList.add("hide");

    document
    .getElementById("bgm")
    .play();

  });

});

</script>

</body>

</html>
